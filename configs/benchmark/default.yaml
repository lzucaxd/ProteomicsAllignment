# Benchmark configuration
# Controls which tasks, methods, and evaluation levels to run.

tasks:
  - breast_subtype
  - breast_vs_lung

methods:
  - raw
  - bridge_aware
  - celligner

levels:
  native_domain_baseline: true
  representation_level_da: true
  marker_profiles: true
  structure_metrics: true
  matching_metrics: false   # scaffold only for now

marker_profiles:
  markers_per_page: 4
  formats: [png, pdf]

structure_metrics:
  n_pcs: 20
  knn_k: 15
  compute_umap: true
  umap_n_neighbors: 15
  umap_min_dist: 0.2

matching_metrics:
  top_k: [1, 3, 5, 10]
  distance_metric: correlation

output_root: reports/benchmark_master

native_domain_output: reports/benchmark_master/native_domain_da
representation_da_output: reports/benchmark_master/representation_level_da
marker_profiles_output: reports/benchmark_master/marker_profiles
structure_output: reports/benchmark_master/structure_metrics
matching_output: reports/benchmark_master/matching_metrics
diagnostics_output: reports/benchmark_master/diagnostics
meeting_output: reports/benchmark_master/meeting
