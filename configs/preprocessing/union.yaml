# Preprocessing with union of CPTAC/CCLE gene symbols (vs intersection in default.yaml).
# Outputs go to data/processed_union/ so intersection-based runs are untouched.

repo_root: .

data_sources:
  cptac:
    PDC000120:
      tissue: Breast
      gene_matrix: data/results/PDC000120/gene_matrix.csv
      msstats_input: data/results/PDC000120/msstats_input.tsv
      subtype_mapping: data/results/PDC000120/gene_matrix_subtype_mapping.csv
    PDC000153:
      tissue: Lung
      gene_matrix: data/results/PDC000153/gene_matrix.csv
      msstats_input: data/results/PDC000153/msstats_input.tsv
    PDC000127:
      tissue: Ovarian
      gene_matrix: data/results/PDC000127/gene_matrix.csv
    PDC000204:
      tissue: Uterine
      gene_matrix: data/results/PDC000204/gene_matrix.csv
  ccle:
    gene_matrix: data/results/CCLE_corrected/gene_matrix.csv
    msstats_input: data/results/CCLE_corrected/msstats_input.tsv
    sample_info: data/ccle_peptide/sample_info_ccle.csv

shared_space:
  join_strategy: union

filtering:
  min_prevalence: 0.70
  min_sd: 0.01
  min_obs_frac: 0.50

imputation:
  strategy: within_domain_gene_median

standardization:
  zscore: false

output_dir: data/processed_union
